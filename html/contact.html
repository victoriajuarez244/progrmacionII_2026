<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Página de contacto">
  <title>Contacto</title>
  <link rel="stylesheet" href="/css/index.css">
</head>
<body>

  <header>
    <h1>Mi Sitio Web</h1>
  </header>

  <div class="container">
    <nav aria-label="Navegación principal">
      <ul>
        <li><a href="/PracticaHTML3y4.html">Inicio</a></li>
        <li><a href="/html/multimedia.html">Multimedia</a></li>
        <li><a href="/html/contact.html">Contacto</a></li>
      </ul>
    </nav>

    <main>
      <h2>Contacto</h2>

      <form>
        <table>
          <tr>
            <td><label for="nombre">Nombre:</label></td>
            <td><input type="text" id="nombre" required></td>
          </tr>
          <tr>
            <td><label for="email">Email:</label></td>
            <td><input type="email" id="email" required></td>
          </tr>
          <tr>
            <td><label for="edad">Edad:</label></td>
            <td><input type="number" id="edad"></td>
          </tr>
          <tr>
            <td><label for="color">Color:</label></td>
            <td><input type="color" id="color"></td>
          </tr>
          <tr>
            <td><label for="comentario">Comentario:</label></td>
            <td><textarea id="comentario" minlength="10"></textarea></td>
          </tr>
          <tr>
            <td></td>
            <td><button type="submit">Enviar</button></td>
          </tr>
        </table>
      </form>

      <section>
        <h2>Ubicación</h2>

        <iframe
          src="https://www.google.com/maps?q=-32.8977696,-60.9092643&z=15&output=embed"
          width="400"
          height="300"
          style="border:0;"
          allowfullscreen=""
          loading="lazy"
          title="Mapa del instituto">
        </iframe>

      </section>

    </main>

    <div class="right">
      <h3>Info</h3>
      <p>Datos de contacto y ubicación.</p>
    </div>
  </div>

  <footer>
    <p>&copy; copyright misitio.com</p>
  </footer>

</body>
</html>
