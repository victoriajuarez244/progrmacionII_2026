<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacto</title>
  <link rel="stylesheet" href="/css/index.css">
</head>
<body>

  <header>
    <h1>Mi Sitio Web</h1>
  </header>

  <div class="container">
    <nav>
      <ul>
        <li><a href="/PracticaHTML3.html">Inicio</a></li>
        <li><a href="/html/multimedia.html">Multimedia</a></li>
        <li><a href="/html/contact.html">Contacto</a></li>
      </ul>
    </nav>

    <main>
      <h2>Contacto</h2>
      <form>
        <table>
          <tr>
            <td><label for="nombre">Nombre:</label></td>
            <td><input type="text" id="nombre" name="nombre" required></td>
          </tr>
          <tr>
            <td><label for="email">Email:</label></td>
            <td><input type="email" id="email" name="email" required></td>
          </tr>
          <tr>
            <td><label for="edad">Edad:</label></td>
            <td><input type="number" id="edad" name="edad"></td>
          </tr>
          <tr>
            <td><label for="color">Color preferido:</label></td>
            <td><input type="color" id="color" name="color"></td>
          </tr>
          <tr>
            <td><label for="comentario">Comentario:</label></td>
            <td><textarea id="comentario" name="comentario" minlength="10"></textarea></td>
          </tr>
          <tr>
            <td></td>
            <td><button type="submit">Enviar</button></td>
          </tr>
        </table>
      </form>
    </main>

    <div class="right">
      <h3>Info</h3>
      <p>Información adicional o links de interés.</p>
    </div>
  </div>

  <footer>
    <p>&copy; copyright misitio.com</p>
  </footer>

</body>
</html>
