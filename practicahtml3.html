<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Página Personal</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playwrite+DE+SAS:wght@100..400&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer"/> 

    <style> 
        body {
            /* Aplicamos la fuente a todo el cuerpo */
            font-family: "Playwrite DE SAS", cursive;
            font-optical-sizing: auto;
            font-style: normal;
        }

        p { 
            /* Cambiado de 'none' a 'block' para que sea visible */
            display: block; 
            font-weight: 400;
        }

        i {
            color: red; /* Un toque de color para tus iconos */
            font-size: 24px;
        }
    </style> 
</head>
<body>
    <h1>Bienvenidos a mi página personal</h1>
    <p>¡Hola mundo!</p>
    <i class="fas fa-heart"></i>
    <i class="fas fa-grin-hearts"></i>
</body>
</html>
