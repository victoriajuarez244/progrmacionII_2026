<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tienda Deportiva</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header>
    <h1>SportStyle</h1>
    <p>Ropa deportiva al mejor precio</p>
</header>

<nav>
    <a href="#">Inicio</a>
    <a href="#">Verano</a>
    <a href="#">Invierno</a>
    <a href="#">Varios</a>
</nav>

<main>

    <section class="productos">

        <!-- Producto 1 -->
        <div class="card">
            <img src="https://via.placeholder.com/300x300" alt="Producto">
            <h3>Remera Deportiva</h3>
            <p>Código: R001</p>
            <p class="precio">$10.000</p>
            <a href="#" class="btn">Consultar</a>
        </div>

        <!-- Producto 2 -->
        <div class="card">
            <img src="https://via.placeholder.com/300x300" alt="Producto">
            <h3>Short Deportivo</h3>
            <p>Código: S002</p>
            <p class="precio">$8.000</p>
            <a href="#" class="btn">Consultar</a>
        </div>

        <!-- Producto 3 -->
        <div class="card">
            <img src="https://via.placeholder.com/300x300" alt="Producto">
            <h3>Buzo Deportivo</h3>
            <p>Código: B003</p>
            <p class="precio">$15.000</p>
            <a href="#" class="btn">Consultar</a>
        </div>

    </section>

</main>

<footer>
    <p>© 2026 SportStyle</p>
</footer>

</body>
</html>
